<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-Frame-Options" content="ALLOWALL" />
  <meta http-equiv="Content-Security-Policy" content="frame-ancestors *" />
  <title>Vuelos MCO – Obsesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0c10;
      --panel:     #10141c;
      --border:    #1e2535;
      --accent:    #e8c84a;
      --green:     #3ecf72;
      --red:       #f05252;
      --blue:      #4a9eff;
      --muted:     #4a5568;
      --text:      #e2e8f0;
      --subtext:   #8899aa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 36px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 14px;
    }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 4px;
      color: var(--accent);
      text-transform: uppercase;
    }

    .brand-sub {
      font-size: 0.75rem;
      color: var(--subtext);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .header-center {
      text-align: center;
    }

    .airport-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 6px;
      color: var(--text);
    }

    .airport-sub {
      font-size: 0.65rem;
      color: var(--subtext);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .header-right {
      text-align: right;
      min-width: 180px;
    }

    #clock {
      font-family: 'Share Tech Mono', monospace;
      font-size: 2.4rem;
      color: var(--accent);
      line-height: 1;
    }

    #date-display {
      font-size: 0.7rem;
      color: var(--subtext);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    #weather-widget {
      font-size: 0.75rem;
      color: var(--text);
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }

    #weather-icon { font-size: 1.1rem; }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 0;
      padding: 0 36px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab {
      padding: 12px 28px;
      font-size: 0.72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--subtext);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      font-weight: 500;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── TABLE ── */
    .table-wrap {
      flex: 1;
      overflow: hidden;
      padding: 0 36px 20px;
      display: flex;
      flex-direction: column;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead th {
      padding: 14px 12px;
      font-size: 0.6rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-weight: 400;
    }

    .col-time    { width: 9%; }
    .col-flight  { width: 11%; }
    .col-airline { width: 17%; }
    .col-dest    { width: 20%; }
    .col-gate    { width: 8%; }
    .col-term    { width: 8%; }
    .col-status  { width: 14%; }
    .col-eta     { width: 13%; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      animation: rowIn 0.4s ease both;
    }

    tbody tr:hover { background: rgba(255,255,255,0.025); }

    @keyframes rowIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    tbody td {
      padding: 14px 12px;
      font-size: 0.85rem;
      vertical-align: middle;
    }

    .time-cell {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.95rem;
      color: var(--text);
    }

    .flight-cell {
      font-family: 'Share Tech Mono', monospace;
      color: var(--accent);
      font-size: 0.85rem;
    }

    .airline-cell {
      color: var(--subtext);
      font-size: 0.78rem;
    }

    .dest-cell {
      font-weight: 500;
      font-size: 0.85rem;
    }

    .dest-code {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--subtext);
      margin-top: 2px;
    }

    .gate-cell {
      font-family: 'Share Tech Mono', monospace;
      color: var(--blue);
    }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 3px;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .status-ontime    { background: rgba(62,207,114,0.12); color: var(--green); border: 1px solid rgba(62,207,114,0.25); }
    .status-boarding  { background: rgba(74,158,255,0.12); color: var(--blue);  border: 1px solid rgba(74,158,255,0.25); }
    .status-departed  { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }
    .status-delayed   { background: rgba(240,82,82,0.12);  color: var(--red);   border: 1px solid rgba(240,82,82,0.25); }
    .status-cancelled { background: rgba(240,82,82,0.18);  color: var(--red);   border: 1px solid rgba(240,82,82,0.4); }
    .status-scheduled { background: rgba(232,200,74,0.08); color: var(--accent);border: 1px solid rgba(232,200,74,0.2); }
    .status-arrived   { background: rgba(62,207,114,0.08); color: var(--green); border: 1px solid rgba(62,207,114,0.15); }

    .eta-cell {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      color: var(--subtext);
    }

    /* ── FOOTER ── */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 36px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .footer-left {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .pulse {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s ease-in-out infinite;
      vertical-align: middle;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    .footer-right {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* ── SCROLLING ANIMATION ── */
    .tbody-scroll {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .no-flights {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="brand">
    <span class="brand-name">Obsesión</span>
    <span class="brand-sub">Pizza & Bar</span>
  </div>
  <div class="header-center">
    <div class="airport-label">MCO — Orlando</div>
    <div class="airport-sub">Orlando International Airport</div>
  </div>
  <div class="header-right">
    <div id="clock">--:--</div>
    <div id="date-display">---</div>
    <div id="weather-widget">
      <span id="weather-icon">🌤</span>
      <span id="weather-temp">--°F</span>
      <span style="color:var(--muted)">Orlando</span>
    </div>
  </div>
</header>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="setMode('departures')" id="tab-dep">✈ Departures</div>
  <div class="tab" onclick="setMode('arrivals')" id="tab-arr">⬇ Arrivals</div>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th class="col-time">Time</th>
        <th class="col-flight">Flight</th>
        <th class="col-airline">Airline</th>
        <th class="col-dest" id="th-dest">Destination</th>
        <th class="col-gate">Gate</th>
        <th class="col-term">Term.</th>
        <th class="col-status">Status</th>
        <th class="col-eta" id="th-eta">Departs</th>
      </tr>
    </thead>
  </table>
  <div class="tbody-scroll">
    <table style="width:100%;border-collapse:collapse;table-layout:fixed;">
      <colgroup>
        <col style="width:9%"><col style="width:11%"><col style="width:17%">
        <col style="width:20%"><col style="width:8%"><col style="width:8%">
        <col style="width:14%"><col style="width:13%">
      </colgroup>
      <tbody id="flight-tbody"></tbody>
    </table>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-left">
    <span class="pulse"></span>
    Live Feed · Simulated Data · MCO Terminal A/B
  </div>
  <div class="footer-right" id="last-updated">Last updated: --:--</div>
</footer>

<script>

const ARRIVALS = [
  { time:"06:10", flight:"AA 301",  airline:"American Airlines",   dest:"New York (JFK)",        code:"JFK", gate:"68",  term:"B", status:"arrived",   eta:"06:08" },

  { time:"07:25", flight:"WN 410",  airline:"Southwest Airlines",  dest:"Dallas Love (DAL)",     code:"DAL", gate:"4",   term:"B", status:"ontime",    eta:"07:25" },
  { time:"07:50", flight:"B6 811",  airline:"JetBlue Airways",     dest:"Boston (BOS)",           code:"BOS", gate:"71",  term:"B", status:"delayed",   eta:"08:30" },
  { time:"08:05", flight:"NK 220",  airline:"Spirit Airlines",     dest:"Philadelphia (PHL)",    code:"PHL", gate:"9",   term:"A", status:"ontime",    eta:"08:05" },
  { time:"08:35", flight:"AA 1190", airline:"American Airlines",   dest:"Miami (MIA)",            code:"MIA", gate:"63",  term:"B", status:"scheduled", eta:"08:35" },
  { time:"09:00", flight:"DL 302",  airline:"Delta Air Lines",     dest:"Los Angeles (LAX)",     code:"LAX", gate:"30",  term:"A", status:"scheduled", eta:"09:00" },
  { time:"09:20", flight:"F9 488",  airline:"Frontier Airlines",   dest:"Denver (DEN)",           code:"DEN", gate:"47",  term:"B", status:"scheduled", eta:"09:20" },
  { time:"09:45", flight:"UA 877",  airline:"United Airlines",     dest:"Houston Intl (IAH)",    code:"IAH", gate:"19",  term:"A", status:"scheduled", eta:"09:45" },
  { time:"10:10", flight:"WN 631",  airline:"Southwest Airlines",  dest:"Nashville (BNA)",       code:"BNA", gate:"6",   term:"B", status:"scheduled", eta:"10:10" },
  { time:"10:30", flight:"AA 504",  airline:"American Airlines",   dest:"Charlotte (CLT)",       code:"CLT", gate:"62",  term:"B", status:"scheduled", eta:"10:30" },
  { time:"11:00", flight:"B6 302",  airline:"JetBlue Airways",     dest:"Fort Lauderdale (FLL)", code:"FLL", gate:"73",  term:"B", status:"scheduled", eta:"11:00" },
  { time:"11:25", flight:"DL 1420", airline:"Delta Air Lines",     dest:"New York (LGA)",        code:"LGA", gate:"28",  term:"A", status:"scheduled", eta:"11:25" },
  { time:"11:50", flight:"NK 540",  airline:"Spirit Airlines",     dest:"Baltimore (BWI)",       code:"BWI", gate:"11",  term:"A", status:"scheduled", eta:"11:50" },
  { time:"12:15", flight:"UA 998",  airline:"United Airlines",     dest:"Newark (EWR)",          code:"EWR", gate:"20",  term:"A", status:"scheduled", eta:"12:15" },
  { time:"12:40", flight:"AA 771",  airline:"American Airlines",   dest:"Dallas/Ft Worth (DFW)", code:"DFW", gate:"65",  term:"B", status:"scheduled", eta:"12:40" },
  { time:"13:05", flight:"WN 225",  airline:"Southwest Airlines",  dest:"Las Vegas (LAS)",       code:"LAS", gate:"8",   term:"B", status:"scheduled", eta:"13:05" },
  { time:"13:30", flight:"DL 630",  airline:"Delta Air Lines",     dest:"Seattle (SEA)",         code:"SEA", gate:"32",  term:"A", status:"scheduled", eta:"13:30" },
  { time:"13:55", flight:"F9 311",  airline:"Frontier Airlines",   dest:"Phoenix (PHX)",         code:"PHX", gate:"46",  term:"B", status:"scheduled", eta:"13:55" },
];

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let currentMode = 'departures';
let scrollOffset = 0;
const ROWS_VISIBLE = 9;
let scrollInterval, clockInterval;

// ─────────────────────────────────────────────
//  CLOCK
// ─────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;

  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('date-display').textContent =
    `${days[now.getDay()]} · ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

  document.getElementById('last-updated').textContent =
    `Last updated: ${h}:${m}:${s}`;
}

// ─────────────────────────────────────────────
//  WEATHER (Open-Meteo — free, no API key)
// ─────────────────────────────────────────────
async function fetchWeather() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=28.4294&longitude=-81.3089&current_weather=true&temperature_unit=fahrenheit';
    const res = await fetch(url);
    const data = await res.json();
    const temp = Math.round(data.current_weather.temperature);
    const code = data.current_weather.weathercode;
    const icons = {
      0:'☀️', 1:'🌤', 2:'⛅', 3:'☁️',
      45:'🌫', 48:'🌫', 51:'🌦', 61:'🌧', 63:'🌧', 65:'🌧',
      71:'🌨', 80:'🌦', 81:'🌧', 95:'⛈', 96:'⛈', 99:'⛈'
    };
    const icon = icons[code] || icons[Math.floor(code/10)*10] || '🌤';
    document.getElementById('weather-icon').textContent = icon;
    document.getElementById('weather-temp').textContent = `${temp}°F`;
  } catch(e) {
    // silently fail — keep placeholder
  }
}

// ─────────────────────────────────────────────
//  STATUS BADGE
// ─────────────────────────────────────────────
const statusMap = {
  ontime:    { label:'On Time',   cls:'status-ontime'    },
  boarding:  { label:'Boarding',  cls:'status-boarding'  },
  departed:  { label:'Departed',  cls:'status-departed'  },
  delayed:   { label:'Delayed',   cls:'status-delayed'   },
  cancelled: { label:'Cancelled', cls:'status-cancelled' },
  scheduled: { label:'Scheduled', cls:'status-scheduled' },
  arrived:   { label:'Arrived',   cls:'status-arrived'   },
};

// ─────────────────────────────────────────────
//  RENDER TABLE
// ─────────────────────────────────────────────
function renderTable() {
  const data = currentMode === 'departures' ? DEPARTURES : ARRIVALS;
  const tbody = document.getElementById('flight-tbody');

  // Update column headers
  document.getElementById('th-dest').textContent = currentMode === 'departures' ? 'Destination' : 'Origin';
  document.getElementById('th-eta').textContent  = currentMode === 'departures' ? 'Departs'     : 'Arrives';

  const slice = data.slice(scrollOffset, scrollOffset + ROWS_VISIBLE);

  tbody.innerHTML = slice.map((f, i) => {
    const s = statusMap[f.status] || statusMap.scheduled;
    return `
      <tr style="animation-delay:${i * 0.04}s">
        <td class="time-cell">${f.time}</td>
        <td class="flight-cell">${f.flight}</td>
        <td class="airline-cell">${f.airline}</td>
        <td>
          <div class="dest-cell">${f.dest}</div>
          <div class="dest-code">${f.code}</div>
        </td>
        <td class="gate-cell">${f.gate}</td>
        <td style="color:var(--subtext);font-size:0.8rem">${f.term}</td>
        <td><span class="status-badge ${s.cls}">${s.label}</span></td>
        <td class="eta-cell">${f.eta}</td>
      </tr>`;
  }).join('');
}

// ─────────────────────────────────────────────
//  AUTO-SCROLL
// ─────────────────────────────────────────────
function startScroll() {
  clearInterval(scrollInterval);
  scrollInterval = setInterval(() => {
    const data = currentMode === 'departures' ? DEPARTURES : ARRIVALS;
    scrollOffset = (scrollOffset + 1) % Math.max(1, data.length - ROWS_VISIBLE + 1);
    renderTable();
  }, 4000);
}

// ─────────────────────────────────────────────
//  TAB SWITCH
// ─────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  scrollOffset = 0;
  document.getElementById('tab-dep').classList.toggle('active', mode === 'departures');
  document.getElementById('tab-arr').classList.toggle('active', mode === 'arrivals');
  renderTable();
  startScroll();
}

// Auto-switch tabs every 30 seconds
setInterval(() => {
  setMode(currentMode === 'departures' ? 'arrivals' : 'departures');
}, 30000);

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
updateClock();
setInterval(updateClock, 1000);
fetchWeather();
setInterval(fetchWeather, 10 * 60 * 1000); // refresh weather every 10 min
renderTable();
startScroll();
</script>
</body>
</html>
