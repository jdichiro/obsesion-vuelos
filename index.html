<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-Frame-Options" content="ALLOWALL" />
  <meta http-equiv="Content-Security-Policy" content="frame-ancestors *" />
  <title>Vuelos MCO – Obsesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0d0d0d;
      --panel:    #141414;
      --panel2:   #1a1a1a;
      --border:   #2a2a2a;
      --red:      #cc1f1f;
      --red-glow: rgba(204,31,31,0.15);
      --red-dim:  rgba(204,31,31,0.08);
      --green:    #2ebd5e;
      --blue:     #4a9eff;
      --yellow:   #f0c040;
      --muted:    #555;
      --text:     #e8e8e8;
      --subtext:  #888;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Oswald', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 36px;
      height: 90px;
      background: var(--panel);
      border-bottom: 3px solid var(--red);
      flex-shrink: 0;
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, var(--red-dim) 0%, transparent 40%, transparent 60%, var(--red-dim) 100%);
      pointer-events: none;
    }

    .brand { display: flex; flex-direction: column; gap: 2px; z-index: 1; }
    .brand-name {
      font-family: 'Oswald', sans-serif;
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 6px;
      color: var(--red);
      text-transform: uppercase;
      line-height: 1;
      text-shadow: 0 0 30px rgba(204,31,31,0.4);
    }
    .brand-sub {
      font-size: 0.62rem;
      color: var(--subtext);
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: 300;
    }

    .header-center { text-align: center; z-index: 1; }
    .airport-label {
      font-family: 'Oswald', sans-serif;
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 8px;
      color: var(--text);
      text-transform: uppercase;
    }
    .airport-sub {
      font-size: 0.6rem;
      color: var(--subtext);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 4px;
      font-weight: 300;
    }

    .header-right { text-align: right; z-index: 1; min-width: 190px; }
    #clock {
      font-family: 'Share Tech Mono', monospace;
      font-size: 2.6rem;
      color: var(--red);
      line-height: 1;
      text-shadow: 0 0 20px rgba(204,31,31,0.35);
    }
    #date-display {
      font-size: 0.62rem;
      color: var(--subtext);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
      font-weight: 300;
    }
    #weather-widget {
      font-size: 0.75rem;
      color: var(--text);
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      font-weight: 400;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      padding: 0 36px;
      background: var(--panel2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      padding: 11px 30px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      margin-bottom: -1px;
    }
    .tab.active { color: var(--red); border-bottom-color: var(--red); }
    .tab:hover:not(.active) { color: var(--subtext); }

    /* ── TABLE ── */
    .table-wrap {
      flex: 1;
      overflow: hidden;
      padding: 0 36px 16px;
      display: flex;
      flex-direction: column;
    }

    table { width: 100%; border-collapse: collapse; table-layout: fixed; }

    thead th {
      padding: 12px 12px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.58rem;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .col-time    { width: 9%; }
    .col-flight  { width: 11%; }
    .col-airline { width: 18%; }
    .col-dest    { width: 21%; }
    .col-gate    { width: 7%; }
    .col-term    { width: 7%; }
    .col-status  { width: 14%; }
    .col-eta     { width: 13%; }

    tbody tr {
      border-bottom: 1px solid #1e1e1e;
      transition: background 0.15s;
      animation: rowIn 0.35s ease both;
    }
    tbody tr:hover { background: rgba(204,31,31,0.04); }

    @keyframes rowIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    tbody td {
      padding: 13px 12px;
      font-size: 0.88rem;
      vertical-align: middle;
      font-family: 'Oswald', sans-serif;
      font-weight: 400;
    }

    .time-cell   { font-family: 'Share Tech Mono', monospace; font-size: 1rem; color: var(--text); }
    .flight-cell { font-family: 'Share Tech Mono', monospace; color: var(--red); font-size: 0.88rem; letter-spacing: 1px; }
    .airline-cell { color: var(--subtext); font-size: 0.8rem; font-weight: 300; letter-spacing: 0.5px; }
    .dest-name   { font-weight: 500; letter-spacing: 0.5px; }
    .dest-code   { font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
    .gate-cell   { font-family: 'Share Tech Mono', monospace; color: var(--blue); font-size: 0.9rem; }
    .term-cell   { color: var(--subtext); font-size: 0.8rem; font-weight: 300; }
    .eta-cell    { font-family: 'Share Tech Mono', monospace; font-size: 0.82rem; color: var(--subtext); }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 2px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .s-ontime    { background: rgba(46,189,94,0.1);   color: var(--green);  border: 1px solid rgba(46,189,94,0.25); }
    .s-boarding  { background: rgba(74,158,255,0.1);  color: var(--blue);   border: 1px solid rgba(74,158,255,0.25); }
    .s-departed  { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid #2a2a2a; }
    .s-delayed   { background: rgba(204,31,31,0.1);   color: #e05555;       border: 1px solid rgba(204,31,31,0.3); }
    .s-cancelled { background: rgba(204,31,31,0.18);  color: #f06060;       border: 1px solid rgba(204,31,31,0.45); }
    .s-scheduled { background: rgba(240,192,64,0.08); color: var(--yellow); border: 1px solid rgba(240,192,64,0.2); }
    .s-arrived   { background: rgba(46,189,94,0.07);  color: var(--green);  border: 1px solid rgba(46,189,94,0.15); }

    /* ── LOADING ── */
    .state-msg {
      text-align: center;
      padding: 50px 20px;
      color: var(--muted);
      font-family: 'Oswald', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 300;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid #2a2a2a;
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 36px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .footer-left {
      font-family: 'Oswald', sans-serif;
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 300;
    }
    .pulse {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--red);
      border-radius: 50%;
      margin-right: 7px;
      animation: pulse 2s ease-in-out infinite;
      vertical-align: middle;
      box-shadow: 0 0 6px rgba(204,31,31,0.5);
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.3; transform: scale(0.65); }
    }
    .footer-right {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.58rem;
      color: var(--muted);
    }

    .tbody-scroll { flex: 1; overflow: hidden; }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-name">Obsesión</div>
    <div class="brand-sub">Pizza & Bar · Orlando</div>
  </div>
  <div class="header-center">
    <div class="airport-label">MCO — Orlando</div>
    <div class="airport-sub">Orlando International Airport · Live Flight Info</div>
  </div>
  <div class="header-right">
    <div id="clock">--:--:--</div>
    <div id="date-display">---</div>
    <div id="weather-widget">
      <span id="weather-icon">🌤</span>
      <span id="weather-temp">--°F</span>
      <span style="color:var(--muted)">Orlando</span>
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="setMode('departures')" id="tab-dep">✈&nbsp; Departures</div>
  <div class="tab" onclick="setMode('arrivals')" id="tab-arr">⬇&nbsp; Arrivals</div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th class="col-time">Time</th>
        <th class="col-flight">Flight</th>
        <th class="col-airline">Airline</th>
        <th class="col-dest" id="th-dest">Destination</th>
        <th class="col-gate">Gate</th>
        <th class="col-term">Term.</th>
        <th class="col-status">Status</th>
        <th class="col-eta" id="th-eta">Scheduled</th>
      </tr>
    </thead>
  </table>
  <div class="tbody-scroll">
    <table style="width:100%;border-collapse:collapse;table-layout:fixed;">
      <colgroup>
        <col style="width:9%"><col style="width:11%"><col style="width:18%">
        <col style="width:21%"><col style="width:7%"><col style="width:7%">
        <col style="width:14%"><col style="width:13%">
      </colgroup>
      <tbody id="flight-tbody">
        <tr><td colspan="8" class="state-msg"><div class="spinner"></div>Loading live flights...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<footer>
  <div class="footer-left">
    <span class="pulse"></span>
    Live Data · AeroDataBox · MCO · Orlando International
  </div>
  <div class="footer-right" id="last-updated">Fetching...</div>
</footer>

<script>
const RAPIDAPI_KEY  = '7f47ce731cmshb08b06e788c9318p11da0fjsne6990e33b0f5';
const AIRPORT_ICAO  = 'KMCO';
const ROWS_VISIBLE  = 9;
const REFRESH_MS    = 5 * 60 * 1000;
const SCROLL_MS     = 4000;
const TAB_SWITCH_MS = 30000;

let currentMode  = 'departures';
let scrollOffset = 0;
let flightData   = { departures: [], arrivals: [] };
let scrollTimer;

function updateClock() {
  const now = new Date();
  const p = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`;
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('date-display').textContent =
    `${days[now.getDay()]} · ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
}
setInterval(updateClock, 1000);
updateClock();

async function fetchWeather() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=28.4294&longitude=-81.3089&current_weather=true&temperature_unit=fahrenheit');
    const d = await r.json();
    const temp  = Math.round(d.current_weather.temperature);
    const code  = d.current_weather.weathercode;
    const icons = {0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',61:'🌧',63:'🌧',65:'🌧',71:'🌨',80:'🌦',81:'🌧',95:'⛈',96:'⛈',99:'⛈'};
    document.getElementById('weather-icon').textContent = icons[code] || icons[Math.floor(code/10)*10] || '🌤';
    document.getElementById('weather-temp').textContent = `${temp}°F`;
  } catch(e) {}
}
fetchWeather();
setInterval(fetchWeather, 10 * 60 * 1000);

function mapStatus(flight) {
  const s = (flight.status || '').toLowerCase();
  if (s.includes('cancel'))                              return { label:'Cancelled', cls:'s-cancelled' };
  if (s.includes('boarding'))                            return { label:'Boarding',  cls:'s-boarding'  };
  if (s.includes('departed') || s.includes('airborne')) return { label:'Departed',  cls:'s-departed'  };
  if (s.includes('arrived')  || s.includes('landed'))   return { label:'Arrived',   cls:'s-arrived'   };
  if (s.includes('delay'))                               return { label:'Delayed',   cls:'s-delayed'   };
  if (s.includes('on time')  || s.includes('ontime'))   return { label:'On Time',   cls:'s-ontime'    };
  return { label: 'Scheduled', cls:'s-scheduled' };
}

function fmtTime(iso) {
  if (!iso) return '--:--';
  try { return new Date(iso).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12: false }); }
  catch { return '--:--'; }
}

async function fetchFlights() {
  const now   = new Date();
  const later = new Date(now.getTime() + 12 * 60 * 60 * 1000);
  const p   = n => String(n).padStart(2,'0');
  const fmt = d => `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
  const base = `https://aerodatabox.p.rapidapi.com/flights/airports/icao/${AIRPORT_ICAO}/${fmt(now)}/${fmt(later)}`;
  const opts = { headers: { 'X-RapidAPI-Key': RAPIDAPI_KEY, 'X-RapidAPI-Host': 'aerodatabox.p.rapidapi.com' } };

  try {
    const [depRes, arrRes] = await Promise.all([
      fetch(`${base}?direction=Departure&withLeg=true&withCancelled=true&withCodeshared=false&withCargo=false&withPrivate=false`, opts),
      fetch(`${base}?direction=Arrival&withLeg=true&withCancelled=true&withCodeshared=false&withCargo=false&withPrivate=false`, opts)
    ]);
    const depData = await depRes.json();
    const arrData = await arrRes.json();

    flightData.departures = (depData.departures || []).map(f => ({
      time:    fmtTime(f.departure?.scheduledTime?.local || f.departure?.scheduledTime?.utc),
      flight:  f.number || '--',
      airline: f.airline?.name || '--',
      dest:    f.arrival?.airport?.name || '--',
      code:    f.arrival?.airport?.iata || '---',
      gate:    f.departure?.gate || '--',
      term:    f.departure?.terminal || '-',
      status:  mapStatus(f),
      eta:     fmtTime(f.departure?.revisedTime?.local || f.departure?.scheduledTime?.local),
    }));

    flightData.arrivals = (arrData.arrivals || []).map(f => ({
      time:    fmtTime(f.arrival?.scheduledTime?.local || f.arrival?.scheduledTime?.utc),
      flight:  f.number || '--',
      airline: f.airline?.name || '--',
      dest:    f.departure?.airport?.name || '--',
      code:    f.departure?.airport?.iata || '---',
      gate:    f.arrival?.gate || '--',
      term:    f.arrival?.terminal || '-',
      status:  mapStatus(f),
      eta:     fmtTime(f.arrival?.revisedTime?.local || f.arrival?.scheduledTime?.local),
    }));

    const n = new Date();
    document.getElementById('last-updated').textContent =
      `Updated: ${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
    scrollOffset = 0;
    renderTable();

  } catch(e) {
    document.getElementById('flight-tbody').innerHTML =
      `<tr><td colspan="8" class="state-msg">⚠ &nbsp; Could not load flight data. Retrying...</td></tr>`;
    document.getElementById('last-updated').textContent = 'Connection error';
  }
}

function renderTable() {
  const data = currentMode === 'departures' ? flightData.departures : flightData.arrivals;
  document.getElementById('th-dest').textContent = currentMode === 'departures' ? 'Destination' : 'Origin';
  document.getElementById('th-eta').textContent  = currentMode === 'departures' ? 'Departs'     : 'Arrives';
  const tbody = document.getElementById('flight-tbody');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="8" class="state-msg">No flights found for this period.</td></tr>`;
    return;
  }
  const slice = data.slice(scrollOffset, scrollOffset + ROWS_VISIBLE);
  tbody.innerHTML = slice.map((f, i) => `
    <tr style="animation-delay:${i * 0.04}s">
      <td class="time-cell">${f.time}</td>
      <td class="flight-cell">${f.flight}</td>
      <td class="airline-cell">${f.airline}</td>
      <td><div class="dest-name">${f.dest}</div><div class="dest-code">${f.code}</div></td>
      <td class="gate-cell">${f.gate}</td>
      <td class="term-cell">${f.term}</td>
      <td><span class="status-badge ${f.status.cls}">${f.status.label}</span></td>
      <td class="eta-cell">${f.eta}</td>
    </tr>`).join('');
}

function startScroll() {
  clearInterval(scrollTimer);
  scrollTimer = setInterval(() => {
    const data = currentMode === 'departures' ? flightData.departures : flightData.arrivals;
    const max  = Math.max(0, data.length - ROWS_VISIBLE);
    if (!max) return;
    scrollOffset = scrollOffset >= max ? 0 : scrollOffset + 1;
    renderTable();
  }, SCROLL_MS);
}

function setMode(mode) {
  currentMode  = mode;
  scrollOffset = 0;
  document.getElementById('tab-dep').classList.toggle('active', mode === 'departures');
  document.getElementById('tab-arr').classList.toggle('active', mode === 'arrivals');
  renderTable();
  startScroll();
}

setInterval(() => setMode(currentMode === 'departures' ? 'arrivals' : 'departures'), TAB_SWITCH_MS);

fetchFlights();
setInterval(fetchFlights, REFRESH_MS);
startScroll();
</script>
</body>
</html>
